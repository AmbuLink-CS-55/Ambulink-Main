services:
  scenario-db:
    image: postgis/postgis:16-3.4
    container_name: ambulink-scenario-db
    environment:
      POSTGRES_DB: ambulink_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ambulink_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - scenario_db_data:/var/lib/postgresql/data

volumes:
  scenario_db_data:

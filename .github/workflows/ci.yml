name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Turbo artifacts
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('package-lock.json', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Lint & Build
        run: npx turbo run lint build

  backend-unit:
    name: Backend Unit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NODE_ENV: test
      APP_STAGE: test
      JWT_SECRET: 12345678901234567890123456789012

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backend unit tests
        run: npm run test:unit:backend

  backend-scenario:
    name: Backend Scenario
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: ambulink_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ambulink_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ambulink_test
      NODE_ENV: test
      APP_STAGE: test
      JWT_SECRET: 12345678901234567890123456789012
      SCENARIO_LOG_DIR: apps/backend/test-results/scenario
      SCENARIO_TIMEOUT_MS: 25000
      SCENARIO_STRICT_EVENT_ORDER: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate:apply --prefix apps/backend

      - name: Seed database
        run: npm run seed:test --prefix apps/backend

      - name: Run integration tests
        run: npm run test:integration:backend

      - name: Run scenario tests
        run: npm run test:scenario

      - name: Upload scenario artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-artifacts
          path: |
            apps/backend/test-results/scenario

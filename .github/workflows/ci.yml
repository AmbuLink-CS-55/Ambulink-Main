name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          corepack enable
          corepack prepare npm@11.8.0 --activate
          corepack npm --version
          corepack npm ci

      - name: Cache Turbo artifacts
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('package-lock.json', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Lint & Build
        run: npx turbo run lint build

      - name: Unit Tests
        run: npx turbo run test
